<main class="page-main shell">
  <section class="page-heading">
    <p class="eyebrow">База героев</p>
    <h1>Герои Dota 2</h1>
    <p>Фильтруй героев по атрибуту, роли и сложности. Нажми на карточку, чтобы открыть подробности.</p>
  </section>
  <section class="toolbar" aria-label="Фильтры героев">
    <label class="field"><span>Поиск</span><input id="heroSearch" type="search" placeholder="Например: Invoker, саппорт, контроль" /></label>
    <label class="field"><span>Атрибут</span><select id="attributeFilter"><option value="all">Все атрибуты</option></select></label>
    <label class="field"><span>Роль</span><select id="roleFilter"><option value="all">Все роли</option></select></label>
    <label class="field"><span>Сложность</span><select id="complexityFilter"><option value="all">Любая сложность</option></select></label>
    <button class="button small" id="favoriteHeroFilter" type="button">Только избранные</button>
  </section>
  <p class="result-line">Найдено: <strong id="heroCount">0</strong></p>
  <section class="cards-grid" id="heroesGrid"></section>
